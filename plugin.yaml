# AlyBrowser Plugin — Self-Improving Agent Protocol v2.0
name: AlyBrowser
version: "2.0.0"
session: alybrowser
role: dev
description: "AI 브라우저 자동화 SDK — Chrome Extension + MCP"

dependencies: [alyadmin]

loop:
  interval: 1m
  prompt: |
    1. session_inbox 확인 → 메시지 있으면 즉시 처리하고 결과 회신
    2. 메시지 없으면 TODO.md에서 IN_PROGRESS 계속 / TODO에서 다음 작업 start
    3. TODO도 비면 idle_tasks를 cooldown 조건에 맞춰 실행
    4. idle_tasks도 cooldown 중이면 self_improve 실행

idle_tasks:
  - name: test-extend
    description: MCP 도구 테스트 확장
    action: npm test로 테스트 수 확인 → 테스트 추가.
    cooldown: 20m
    priority: 1

  - name: security-scan
    description: 보안 패턴 검색
    action: 하드코딩된 시크릿, 인증 누락, 민감 데이터 노출 검색.
    cooldown: 1h
    priority: 2

  - name: docs-update
    description: README/CHANGELOG 최신화
    action: 최근 커밋과 README 비교 → 누락 기능 문서화.
    cooldown: 2h
    priority: 3

self_improve:
  description: SDK 품질 자체 개선
  actions:
    - 에러 핸들링 강화
    - 타입 안전성 (any 제거)
    - 성능 최적화
  cooldown: 30m
